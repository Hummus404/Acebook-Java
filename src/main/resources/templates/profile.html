<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>Profile</h1>
    <section>
        <img th:src="${user.profilePicture}" alt="">
        <p th:text="${user.username}"></p>
    </section>

    <section>
        <div th:each="post : ${posts}">
            <img th:src="@{/images/{file}(file=${post.image})}" alt="">
            <p th:text="${post.content}"></p>
        </div>
    </section>
</body>
</html>
