<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>Profile</h1>
    <section>
        <button type="button" >Add Friend</button>
        <img th:src="${user.profilePicture}" alt="">
        <p th:text="${user.username}"></p>
    </section>

    <section>
        <div th:each="post : ${posts}">
            <p th:text="${post.content}"></p>
        </div>
    </section>

    <div class="profile-actions" th:unless="${isOwnProfile}">

        <!-- CASE 1: No relationship exists yet -> SHOW REQUEST BUTTON -->
        <div th:if="${friendshipStatus == 'NONE'}">
            <form th:action="@{/friends/request/{id}(id=${user.id})}" method="post">
                <button type="submit" class="btn-friend-request">Add Friend</button>
            </form>
        </div>

        <!-- CASE 2: Current user sent a request and it is pending -->
        <div th:if="${friendshipStatus == 'PENDING'}">
            <button class="btn-disabled" disabled>Friend Request Sent</button>
        </div>

        <!-- CASE 3: Profile owner sent a request to the current user -->
        <div th:if="${friendshipStatus == 'INCOMING_PENDING'}">
            <p>This user sent you a friend request!</p>
            <a href="/friends" class="btn-link">Manage Request on Friends Page</a>
        </div>

        <!-- CASE 4: Users are already friends -->
        <div th:if="${friendshipStatus == 'ACCEPTED' || friendshipStatus == 'INCOMING_ACCEPTED'}">
            <span class="badge-friend">✓ Friends</span>
        </div>

    </div>

</body>
</html>
