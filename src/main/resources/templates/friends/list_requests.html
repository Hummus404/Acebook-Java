<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Friends</title>
    <link rel="stylesheet" href="/main.css" />
</head>
<body>
    <div th:replace="~{posts/base :: header}"></div>
    <main class="feed-page">
    <h1>My Friends</h1>

    <div class="tab-buttons">
        <button onclick="showTab('friends')" id="btn-friends" class="tab-btn active">My Friends</button>
        <button onclick="showTab('incoming')" id="btn-incoming" class="tab-btn">
            Incoming Requests
            <span th:if="${!incomingRequests.isEmpty()}"
                  th:text="'(' + ${#lists.size(incomingRequests)} + ')'">
            </span>
        </button>
        <button onclick="showTab('sent')" id="btn-sent" class="tab-btn">
            Sent Requests
            <span th:if="${!sentRequests.isEmpty()}"
                  th:text="'(' + ${#lists.size(sentRequests)} + ')'">
            </span>
        </button>
    </div>

    <!-- My Friends Tab -->
    <div id="tab-friends">

        <div th:if="${friends.isEmpty()}">
            <p>You don't have any friends yet.</p>
        </div>

        <ul class="timeline-list">
            <li class="card friend-row" th:each="friend : ${friends}">
                <img th:src="${friend.getProfilePicture() != null ? '/images/' + friend.getProfilePicture() : '/images/defaultProfileAvatar.jpeg'}"
                     class="avatar"
                     alt="Profile Picture"
                     width="40"/>
                <span class="user-chip__name" th:text="${friend.username}"></span>
                <a th:href="@{/profile/{username}(username=${friend.username})}">View Profile</a>
            </li>
        </ul>

    </div>

    <!-- Incoming Requests Tab -->
    <div id="tab-incoming" style="display:none">

        <div th:if="${incomingRequests.isEmpty()}">
            <p>No incoming friend requests.</p>
        </div>

        <ul class="timeline-list">
            <li class="card friend-row" th:each="req : ${incomingRequests}">
                <img th:src="${req.requester.getProfilePicture() != null ? '/images/' + req.requester.getProfilePicture() : '/images/defaultProfileAvatar.jpeg'}"
                     class="avatar"
                     alt="Profile Picture"
                     width="40"/>

                <span class="user-chip__name" th:text="${req.requester.username}"></span>

                <form th:action="@{/friends/accept/{id}(id=${req.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn">Accept</button>
                </form>

                <form th:action="@{/friends/decline/{id}(id=${req.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn--secondary">Decline</button>
                </form>
            </li>
        </ul>

    </div>

    <!-- Sent Requests Tab -->
    <div id="tab-sent" style="display:none">

        <div th:if="${sentRequests.isEmpty()}">
            <p>No pending sent requests.</p>
        </div>

        <ul class="timeline-list">
            <li th:each="req : ${sentRequests}" class="card friend-row">
                <img th:src="${req.addressee.getProfilePicture() != null ? '/images/' + req.addressee.getProfilePicture() : '/images/defaultProfileAvatar.jpeg'}"
                     class="avatar"
                     alt="Profile Picture"
                     width="40"/>
                <span class="user-chip__name" th:text="${req.addressee.username}"></span>
                <span>Pending...</span>
            </li>
        </ul>

    </div>
    </main>

    <script>
        function showTab(tabName) {
            document.getElementById('tab-friends').style.display = 'none';
            document.getElementById('tab-incoming').style.display = 'none';
            document.getElementById('tab-sent').style.display = 'none';

            document.getElementById('btn-friends').classList.remove('active');
            document.getElementById('btn-incoming').classList.remove('active');
            document.getElementById('btn-sent').classList.remove('active');

            document.getElementById('tab-' + tabName).style.display = 'block';
            document.getElementById('btn-' + tabName).classList.add('active');
        }
    </script>
</body>
</html>
