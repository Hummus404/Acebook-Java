<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Search Results</title>
  <link rel="stylesheet" href="/main.css" />
</head>

<body>
<h1> YOYO PEOPLE </h1>
<div th:replace="~{posts/base :: header}"></div>
<h1> Search Results</h1>

<ul th:if="${searchResults != null}">
  <li th:each="user : ${searchResults}">
    <div class="search-card">
      <a th:href="@{/profile/{username}(username=${user.username})}">
      <img th:src="${user.profilePicture != null ? 'images/' + user.profilePicture : 'images/defaultProfileAvatar.jpeg'}"
           class="logo"
           alt="Profile Picture" />
      <p class="username-tag" th:text="'Username: ' + ${user.username}"></p>
      </a>
      <p class="name-tag" th:text="'Name: ' + ${user.first_name} + ' ' + ${user.surname}"></p>
    </div>
    <div>
<!--      th:if="${friendshipStatus == 'NONE'}"-->
      <form th:action="@{/friends/request/{id}(id=${user.id})}" method="post">
        <button type="submit">Add Friend</button>
      </form>
    </div>
  </li>
</ul>
<div th:if="${searchResults == null or searchResults.isEmpty()}">
  <p class="no-result">No users found...</p>
</div>
</body>
</html>
