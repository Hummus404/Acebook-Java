<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Acebook</title>
	<link rel="stylesheet" th:href="@{/main.css}"/>
</head>

<body>
<div class="hero">
	<nav class="nav" th:fragment="header">

				<a th:href="@{/posts}"><img th:src="@{/images/cat_typing.gif}" alt="logo" class="logo"></a>
				<ul>
					<li><a th:href="@{/posts}">Home</a></li>
					<li><a th:href="@{/friends}">Friends</a></li>
				</ul>
				<!--	THIS IS MY SEARCH BAR AND BUTTON DO NOT KILL IT PLEASE-->
				<form action="/search" method="get">
				<input type="text" name="userSearch" minlength="3" placeholder="Search..." required>
				<button type="submit" class="search-btn">Search</button>
				</form>
				<!--	THIS IS MY SEARCH BAR AND BUTTON DO NOT KILL IT PLEASE-->
				<div class="user-menu">
					<img th:src="${currentProfilePicture != null ? 'images/' + currentProfilePicture : 'images/defaultProfileAvatar.jpeg'}"
					     class="user-img"
					     alt="Nav Profile Picture" />

					<div class="sub-menu-wrap" id="subMenu">
						<div class="sub-menu">
							<div class="user-info">
								<img th:src="${currentProfilePicture != null ? 'images/' + currentProfilePicture : 'images/defaultProfileAvatar.jpeg'}"
								     class="user-img"
								     alt="Profile Picture" />
								<p th:text="${currentUsername}"></p>
							</div>
							<hr>

							<a th:href="@{/profile/{username}(username=${currentUsername})}" class="sub-menu-link">
								<img th:src="@{/images/circle-user.svg}" alt="edit profile icon">
								<p>Profile</p>
								<span>></span>
							</a>
							<a th:href="@{/logout}" class="sub-menu-link">
								<img th:src="@{/images/exit.svg}" alt="exit icon" style="transform: scaleX(-1);">
								<p>Logout</p>
								<span>></span>
							</a>

				</div>
			</div>
		</div>

	</nav>
</div>

</body>

</html>
