<!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org"
          xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
    <head lang="en">
        <meta charset="UTF-8"/>
        <title>Acebook</title>
        <link rel="stylesheet" href="/main.css" />
    </head>
    <body>

    <h1>Posts</h1>

    <div sec:authorize="isAuthenticated()" id="greeting">
        Signed in as <span sec:authentication="principal.attributes['email']"></span>
    </div>

    <form action="#" th:action="@{/posts/new}" th:object="${post}" method="post" enctype="multipart/form-data">
        <p>Content: <input type="text" th:field="*{content}" /></p>
        <p><input type="file" name="imageFile"></p>
        <p><input type="submit" value="Submit" /> <input type="reset" value="Reset" /></p>
    </form>

    <ul>
        <li th:each="post : ${posts}">
        <p th:text="${post.content}"></p>
        <img th:if="${post.image != null and !#strings.isEmpty(post.image)}" th:src="@{'/images/' + ${post.image}}" width="300"/>
        </li>

    </ul>

    </body>
</html>
