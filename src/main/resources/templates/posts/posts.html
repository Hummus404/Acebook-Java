<body style="background-color: #f9fafb; padding: 24px;">

<h2>My Feed</h2>
<h3>******THIS IS HERE TO CHECK DEPLOYMENT AND CAN BE REMOVED ITS A H3 TAG IN POSTS.HTML******</h3>

<div th:each="post : ${posts}" class="post-container">

    <div class="author-sidebar">
        <img th:src="${post.profilePictureUrl != null} ? ${post.profilePictureUrl} : '/static/default-avatar.png'"
             th:alt="${post.username} + ' profile photo'"
             class="avatar-circle" />

        <span th:text="${post.username}" class="username-label">Username</span>
    </div>

    <div class="post-content">
        <p th:text="${post.content}"></p>
    </div>

</div>
